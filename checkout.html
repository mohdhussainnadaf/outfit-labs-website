<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outfit Labs | Checkout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="openMenu" class="icon-btn" aria-label="Open menu">☰</button>
    <a class="brand-link" href="inventory.html">Outfit Labs</a>
    <a class="cart-link" href="cart.html" aria-label="Cart">🛒<span id="cartBadge" class="cart-badge hidden">0</span></a>
  </header>

  <aside id="sideMenu" class="side-menu" aria-label="Menu">
    <button id="closeMenu" class="close-btn" aria-label="Close menu">×</button>
    <a href="inventory.html">All Items</a>
    <a href="#about">About</a>
    <button id="logoutButton" class="menu-button">Logout</button>
    <button id="resetButton" class="menu-button">Reset App State</button>
  </aside>
  <div id="menuShade" class="menu-shade"></div>

  <main class="page-content checkout-content">
    <h1>Checkout</h1>
    <section class="checkout-grid">
      <form id="checkoutForm" class="checkout-form">
        <h2>Your Information</h2>
        <input name="firstName" type="text" placeholder="First Name" required />
        <input name="lastName" type="text" placeholder="Last Name" required />
        <input name="postalCode" type="text" placeholder="Postal Code" required />
        <button type="submit" class="primary-btn full-btn">Place Order</button>
      </form>
      <aside class="summary-card">
        <h2>Order Summary</h2>
        <div id="checkoutItems"></div>
        <div class="summary-line"><span>Item total</span><strong id="itemTotal">$0.00</strong></div>
        <div class="summary-line"><span>Tax</span><strong id="taxTotal">$0.00</strong></div>
        <div class="summary-line total"><span>Total</span><strong id="grandTotal">$0.00</strong></div>
      </aside>
    </section>
  </main>

  <footer id="about" class="footer fixed-footer">
    <div class="socials"><span>𝕏</span><span>f</span><span>in</span></div>
    <p>© 2026 Outfit Labs. All Rights Reserved. Terms of Service | Privacy Policy</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
